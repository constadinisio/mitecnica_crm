# Mi Tecnica CRM — Apache reverse proxy for the API.
# Included from crm.conf. Adjust the upstream port if you change it in api/.env.

ProxyPreserveHost On
ProxyRequests     Off

# /api/* -> Node backend (PM2)
<Location "/api">
    ProxyPass        "http://127.0.0.1:4000/api"
    ProxyPassReverse "http://127.0.0.1:4000/api"
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}s"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
</Location>

# Healthcheck shortcut
<Location "/health">
    ProxyPass        "http://127.0.0.1:4000/health"
    ProxyPassReverse "http://127.0.0.1:4000/health"
</Location>
