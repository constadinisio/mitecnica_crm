# Mi Tecnica CRM — Apache virtual host (frontend)
# Place in /etc/apache2/sites-available/ and enable with `a2ensite crm.conf`.
# Requires: mod_rewrite, mod_headers, mod_proxy, mod_proxy_http.

<VirtualHost *:80>
    ServerName crm.mitecnica.local
    ServerAdmin admin@mitecnica.ar

    DocumentRoot /var/www/mi-tecnica-crm/crm/public

    <Directory /var/www/mi-tecnica-crm/crm/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy API under /api to the Node backend
    Include /etc/apache2/sites-available/api-crm-proxy.conf

    ErrorLog  ${APACHE_LOG_DIR}/crm-error.log
    CustomLog ${APACHE_LOG_DIR}/crm-access.log combined
</VirtualHost>

